
name: Python CI

on: # триггеры (когда запускать: при пуше и пулле в любую ветку)
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs: # задачи (что делать)
  test: # имя задачи
    runs-on: ubuntu-latest # виртуальная машина (ВМ) (окружение)
    strategy: # стратегия - параллельный запуск на нескольких версиях Python, т.е. test будет запущена дважды
      matrix:
        python-version: ["3.10", "3.11"]


    steps: # шаги - конкретные команды
      - uses: actions/checkout@v4 # скачивает код из репозитория на ВМ
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5 # устанавливает нужную версию Python (из матрицы)
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install ruff pytest black
          pip install -r requirements.txt
      - name: Lint with ruff
        run: |
          ruff check .
          black --check --diff .
#      - name: Type check with mypy
#        run: mypy app --ignore-missing-imports
      - name: Test with pytest
        run: pytest tests/